name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn virtualenv

    - name: Run MLflow Project (Training)
      run: |
        cd MLProject
        mlflow run . --env-manager=local

    - name: Upload Artifact to GitHub 
      uses: actions/upload-artifact@v4
      with:
        name: trained-model-artifact
        path: MLProject/model_output/

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image 
      run: |
        cd MLProject
        mlflow models build-docker -m model_output -n ${{ secrets.DOCKER_USERNAME }}/steam-model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/steam-model:latest